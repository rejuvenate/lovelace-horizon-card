# Real Home Assistant instance for visually verifying the Horizon Card visual editor
# (issue #41, "Stufe 2"). NOT part of CI. Pin an EXACT Home Assistant version (never latest/
# stable) so the seeded .storage schema below keeps matching HA; bump it deliberately.
services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2025.12
    container_name: horizon-card-editor-verify
    volumes:
      - ./config:/config
    ports:
      - '8123:8123'
